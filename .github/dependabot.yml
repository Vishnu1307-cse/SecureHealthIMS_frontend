# =============================================================================
# SecureHealthIMS Frontend - Dependabot Configuration
# =============================================================================
# Automatically creates PRs for dependency updates to keep the project
# secure and up-to-date.
# =============================================================================

version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "avkbsurya119"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group minor and patch updates together
      production-dependencies:
        patterns:
          - "react*"
          - "axios"
          - "framer-motion"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "eslint*"
          - "vite*"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
