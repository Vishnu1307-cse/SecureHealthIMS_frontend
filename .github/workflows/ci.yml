# =============================================================================
# SecureHealthIMS Frontend - CI/CD Pipeline
# =============================================================================
# Professional CI/CD pipeline with quality gates, security scanning,
# and automated deployments.
#
# Pipeline Stages:
# 1. Quality Checks (Parallel): Lint, Type Check, Security Audit
# 2. Build: Compile and bundle application
# 3. Test: Unit tests with coverage reporting
# 4. Deploy: Automated via Vercel (on main branch)
# =============================================================================

name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggers

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  VITE_API_URL: ${{ secrets.VITE_API_URL }}

jobs:
  # ===========================================================================
  # Stage 1: Quality Checks (Parallel Execution)
  # ===========================================================================

  lint:
    name: 🔍 Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ===========================================================================
  # Stage 2: Build
  # ===========================================================================

  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: dist/
          retention-days: 7

      - name: Report build size
        run: |
          echo "## 📦 Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist -type f -name "*.js" -exec ls -lh {} \; | awk '{print "| " $NF " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 3: Test (Placeholder - Enable when tests are implemented)
  # ===========================================================================

  # test:
  #   name: 🧪 Unit Tests
  #   runs-on: ubuntu-latest
  #   needs: [lint]
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: ${{ env.NODE_VERSION }}
  #         cache: 'npm'
  #
  #     - name: Install dependencies
  #       run: npm ci
  #
  #     - name: Run tests with coverage
  #       run: npm test -- --coverage --watchAll=false
  #
  #     - name: Upload coverage report
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: coverage-report
  #         path: coverage/
  #         retention-days: 7
  #
  #     - name: Coverage summary
  #       run: |
  #         echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
  #         cat coverage/coverage-summary.json | jq -r '.total | "| Statements | \(.statements.pct)% |\n| Branches | \(.branches.pct)% |\n| Functions | \(.functions.pct)% |\n| Lines | \(.lines.pct)% |"' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 4: Quality Gate
  # ===========================================================================

  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, security-audit, build]
    if: always()
    steps:
      - name: Check quality gate status
        run: |
          echo "## 🎯 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.lint.result }}" == "success" ]]; then
            echo "✅ Lint Check: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Lint Check: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.security-audit.result }}" == "success" ]]; then
            echo "✅ Security Audit: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Security Audit: Issues found (non-blocking)" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ Build: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if critical checks failed
          if [[ "${{ needs.lint.result }}" != "success" ]] || [[ "${{ needs.build.result }}" != "success" ]]; then
            echo ""
            echo "❌ **Quality Gate: FAILED**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo ""
          echo "✅ **Quality Gate: PASSED**" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Stage 5: Deploy Notification
  # ===========================================================================

  deploy-notification:
    name: 🚀 Deployment Status
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment notice
        run: |
          echo "## 🚀 Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Vercel will automatically deploy this commit to production." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Deployment](https://secure-health-ims-frontend.vercel.app/)" >> $GITHUB_STEP_SUMMARY
